# Admin — admin.zagvar.com  (RESERVED)
#
# The admin frontend isn't built yet. This vhost reserves the hostname and
# returns 503 so the domain resolves cleanly. When the admin app exists, point
# this at its container (e.g. proxy_pass http://127.0.0.1:3001) like the
# storefront vhost, and add it to the API's CORS_ORIGINS.

server {
    listen 80;
    listen [::]:80;
    server_name admin.zagvar.com;

    include snippets/cloudflare-realip.conf;

    location / {
        default_type text/plain;
        return 503 "admin.zagvar.com is not deployed yet\n";
    }
}

# API — api.zagvar.com -> NestJS container on 127.0.0.1:3010
#
# HTTP-only to start. TLS is added by either:
#   - a Cloudflare Origin Certificate + SSL mode "Full (strict)"  (recommended,
#     since DNS is managed in Cloudflare), or
#   - `certbot --nginx -d api.zagvar.com` for a grey-clouded record.
# Either way, keep the Cloudflare real-IP snippet so logs/rate-limits see the
# true visitor address.

upstream zagvar_api {
    server 127.0.0.1:3010;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name api.zagvar.com;

    include snippets/cloudflare-realip.conf;

    # Multer uploads; Cloudflare free tier caps request bodies at 100m anyway.
    client_max_body_size 25m;

    # Compression for JSON/text responses.
    gzip on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types application/json application/javascript text/plain text/css application/xml;

    # Baseline security headers (HSTS is added with the TLS block).
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;

    location / {
        proxy_pass http://zagvar_api;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Connection        "";
        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
    }
}

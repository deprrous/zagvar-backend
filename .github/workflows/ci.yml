name: CI

on:
  pull_request:
  push:
    branches-ignore:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      # prisma.config.ts reads DATABASE_URL at load; generate/build don't
      # connect, so a dummy URL is enough here.
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?schema=public
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci --no-audit --no-fund

      - name: Prisma generate
        run: npx prisma generate

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        continue-on-error: true
        run: npx eslint "{src,test}/**/*.ts"

      - name: Build
        run: npm run build

      - name: Unit tests
        continue-on-error: true
        run: npm test
